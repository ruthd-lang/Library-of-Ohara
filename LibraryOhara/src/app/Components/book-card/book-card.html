<div class="card h-100 shadow-3 rounded-5 border-0" data-aos="fade-right">
  <div class="bg-image hover-overlay" mdbRipple rippleColor="light">
    <img [src]="book.image || 'https://dummyimage.com/600x400/eceff1/607d8b.png&text=Sem+Capa'" class="card-img-top rounded-top-5" style="object-fit: cover; height: 200px;" alt="Capa do livro {{ book.title }}"/>
    <a [routerLink]="['/book', book.id]">
      <div class="mask" style="background-color: rgba(251, 251, 251, 0.15);"></div>
    </a>
  </div>

  <div class="card-body p-4" data-aos="fade-up">
    <h5 class="card-title text-dark fw-bold mb-3">
      {{ book.title | capitalize }}
    </h5>

    <p class="card-text text-muted lh-lg" style="font-size: 0.95rem;">
      {{ book.description }}
    </p>
  </div>

  <ul class="list-group list-group-flush">
    
    <li class="list-group-item px-4 border-0 text-muted">
      <strong class="text-dark">Autor:</strong> {{ book.author | capitalize }}
    </li>

    <li class="list-group-item px-4 border-0 text-muted">
      <strong class="text-dark">Categoria:</strong> {{ book.category | capitalize }}
    </li>

    <li class="list-group-item px-4 border-0 text-muted pb-4">
      <strong class="text-dark">Ano:</strong> {{ book.year | yearFormat }}
    </li>
  </ul>

  <div class="card-body d-flex justify-content-center align-items-center flex-wrap gap-2 pt-0 pb-4">
    <button class="btn btn-outline-danger btn-sm btn-rounded" mdbRipple (click)="onDelete()">
      <i class="fas fa-trash"></i>
    </button>
    
    <button class="btn btn-outline-primary btn-sm btn-rounded" mdbRipple (click)="onEdit()">
      <i class="fas fa-edit"></i>
    </button>

    <a class="btn btn-outline-secondary btn-sm btn-rounded" mdbRipple [routerLink]="['/book', book.id]">
      <i class="fas fa-eye me-1"></i> Detalhar
    </a>
  </div>
</div>
