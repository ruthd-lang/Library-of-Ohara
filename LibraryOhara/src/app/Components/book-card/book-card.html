<div class="card h-100 shadow-2-strong">
  <div class="bg-image hover-overlay ripple" data-mdb-ripple-color="light">
    <img src="https://via.placeholder.com/150" class="card-img-top" alt="Capa do livro {{ book.title }}"/>
    <a [routerLink]="['/book', book.id]">
      <div class="mask" style="background-color: rgba(251, 251, 251, 0.15);"></div>
    </a>
  </div>

  <div class="card-body">
    <h5 class="card-title">
      {{ book.title | capitalize }}
    </h5>

    <p class="card-text text-muted" style="font-size: 0.9rem;">
      {{ book.description }}
    </p>
  </div>

  <ul class="list-group list-group-light list-group-small">
    
    <li class="list-group-item px-4">
      <strong>Autor:</strong> {{ book.author | capitalize }}
    </li>

    <li class="list-group-item px-4">
      <strong>Categoria:</strong> {{ book.category | capitalize }}
    </li>

    <li class="list-group-item px-4">
      <strong>Ano:</strong> {{ book.year | yearFormat }}
    </li>
  </ul>

  <div class="card-body d-flex justify-content-around">
    <button class="btn btn-link text-danger btn-sm p-0" (click)="onDelete()">
      <i class="fas fa-trash me-1"></i> Excluir
    </button>
    
    <button class="btn btn-link text-primary btn-sm p-0" (click)="onEdit()">
      <i class="fas fa-edit me-1"></i> Editar
    </button>

    <a class="btn btn-link text-secondary btn-sm p-0" [routerLink]="['/book', book.id]">
      <i class="fas fa-eye me-1"></i> Detalhar
    </a>
  </div>
</div>
